<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
            margin: 20px;
        }
        h1 {
            color: #d9534f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ha ocurrido un error</h1>
        <p>{{ error_message }}</p>
        <p>Vuelve a la <a href="{{ url_for('index') }}">página principal</a> o intenta de nuevo más tarde.</p>
    </div>
</body>
</html>
