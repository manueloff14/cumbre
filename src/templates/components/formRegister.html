<form action="/register" method="post">
    <input type="email" name="email" id="email" placeholder="E-mail" value="{{ email }}" required>
    <input type="text" name="username" id="username" placeholder="Usuario" value="{{ username }}" required>
    <input type="password" name="password" id="password" placeholder="Contraseña" required>
    <input type="password" name="confirm_password" id="confirm_password" placeholder="Repite la contraseña" required>
    <button type="submit">
        <strong>CREAR</strong>
    </button>
</form>
