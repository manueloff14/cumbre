<style>
    .fondoNegro {
        display: none;
        background-color: black;
        position: fixed;
        top: 0px;
        left: 0px;
        width: calc(100% - 40px);
        height: 100vh;
        padding: 20px;
        z-index: 1000000;
    }

    .buscador_superior {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
    }

    .buscador_superior button {
        display: flex;
        border: none;
        background-color: red;
        border-radius: 100px;
        padding: 10px;
    }

    .buscador_superior button img {
        width: 20px;
    }

    .fondoNegro form {
        background-color: rgb(43, 43, 43);
        display: flex;
        border-radius: 15px;
    }

    .fondoNegro form button img {
        width: 20px;
    }

    .fondoNegro form button {
        padding: 10px;
        background-color: rgb(43, 43, 43);
        border: 2px solid transparent;
        border-radius: 100px;
        display: flex;
        margin: 5px;
        transition: 0s;
        width: auto;
    }

    .fondoNegro form button:hover {
        border: 2px solid transparent;
    }

    .fondoNegro form input {
        background-color: transparent;
        border: none;
        padding: 0px 15px;
        padding-right: 10px;
        outline: none;
        width: calc(100% - 40px);
        border-radius: 15px;
    }
</style>
